workflows:
  ios-simulator-appetize:
    name: Compilación iOS para Appetize.io (Simulador)
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      node: latest
      xcode: latest
    scripts:
      - name: Instalar dependencias web
        script: npm install
      - name: Compilar la web (React/Vite)
        script: npm run build
      - name: Sincronizar Capacitor iOS
        script: npx cap sync ios
      - name: Compilar .app para Simulador (x86_64 / arm64)
        script: |
          cd ios/App
          # Compilamos especificando el SDK de Simulador, NO de iPhone físico
          xcodebuild clean build \
            -project App.xcodeproj \
            -scheme App \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -clonedSourcePackagesDirPath ./SourcePackages \
            CONFIGURATION_BUILD_DIR=$PWD/build
            
      - name: Comprimir .app en .zip para Appetize.io
        script: |
          cd ios/App/build
          # Appetize exige que el archivo subido sea un .zip que contenga la carpeta .app
          zip -r GeoLearn_Tenerife_Appetize.zip App.app
          
    artifacts:
      - ios/App/build/GeoLearn_Tenerife_Appetize.zip
